name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: sms-archive.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            bin: sms-archive
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: sms-archive
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item -Force target/${{ matrix.target }}/release/${{ matrix.bin }} dist/
          # TODO: copy native libs (onnx/ffmpeg/libheif) into dist/libs/${{ matrix.target }}
      - name: Sign (Windows)
        if: matrix.os == 'windows-latest'
        run: echo "TODO: configure code signing"
      - name: Notarize (macOS)
        if: matrix.os == 'macos-latest'
        run: echo "TODO: configure notarization"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sms-archive-${{ matrix.target }}
          path: dist
