name: Release

# Required repository secrets (all optional — steps below skip cleanly,
# producing an unsigned/unnotarized build, when the relevant secret is unset):
#
#   Windows Authenticode code signing via Azure Artifact Signing (formerly
#   Trusted Signing; used by the "Sign (Windows)" step). Certificates are
#   short-lived and never exportable, so there is no PFX to store — instead a
#   service principal holding the "Artifact Signing Certificate Profile
#   Signer" role on the Slagathores-Apps signing account authenticates the
#   signing request:
#     AZURE_TENANT_ID          - Azure AD tenant of the signing account
#     AZURE_CLIENT_ID          - service principal (app registration) client ID
#     AZURE_CLIENT_SECRET      - client secret for that service principal
#
#   macOS signing + notarization (used by the "Notarize (macOS)" step):
#     APPLE_CERT_BASE64        - base64-encoded Developer ID Application .p12 certificate
#     APPLE_CERT_PASSWORD      - password protecting the .p12
#     APPLE_SIGNING_IDENTITY   - codesign identity, e.g.
#                                 "Developer ID Application: Jane Doe (TEAMID1234)"
#     APPLE_ID                 - Apple ID email used to authenticate with notarytool
#     APPLE_ID_PASSWORD        - app-specific password for that Apple ID
#                                 (https://support.apple.com/en-us/102654)
#     APPLE_TEAM_ID            - Apple Developer Team ID
#
# None of these are required to build and package a release; the workflow
# always produces an artifact, just unsigned/unnotarized when secrets are
# absent.

on:
  push:
    tags:
      - "v*"
  # Manual runs build (and, with secrets present, sign) the same artifacts
  # without cutting a tag — useful for validating the pipeline.
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: sms-archive.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            bin: sms-archive
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: sms-archive
    runs-on: ${{ matrix.os }}
    # The `secrets` context cannot be referenced directly in step `if:`
    # conditions, so surface secret presence as job-level env booleans
    # (env *can* read secrets) and gate the signing steps on those instead.
    env:
      HAS_AZURE_SIGNING: ${{ secrets.AZURE_TENANT_ID != '' && secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_CLIENT_SECRET != '' }}
      HAS_APPLE_ID: ${{ secrets.APPLE_ID != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item -Force target/${{ matrix.target }}/release/${{ matrix.bin }} dist/

      - name: Bundle native libraries
        shell: pwsh
        run: |
          # The `ort` crate (ONNX Runtime bindings) downloads a prebuilt
          # onnxruntime shared library at build time and drops it somewhere
          # under target/; the exact subdirectory varies by ort/onnxruntime
          # version and platform, so we search for it recursively rather
          # than hardcode a path. It must sit next to the executable for the
          # OS loader to find it at runtime, so it's copied into dist/
          # directly (not a libs/ subfolder).
          $libPattern = switch ("${{ matrix.os }}") {
            "windows-latest" { "onnxruntime.dll" }
            "macos-latest"   { "libonnxruntime*.dylib" }
            default          { "libonnxruntime*.so*" }
          }

          $lib = Get-ChildItem -Path target -Recurse -Filter $libPattern -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -ne $lib) {
            Copy-Item -Force $lib.FullName (Join-Path "dist" $lib.Name)
            Write-Host "Bundled native library: $($lib.FullName) -> dist/$($lib.Name)"
          } else {
            Write-Warning "Could not locate '$libPattern' under target/. The packaged binary may fail to start on a machine without ONNX Runtime installed."
          }

          # ffmpeg, tesseract, and libheif are deliberately NOT bundled:
          # the app shells out to system `ffmpeg`/`tesseract` executables at
          # runtime, and libheif is an optional system library. All three
          # are large and/or separately licensed (see THIRD_PARTY_NOTICES).
          # Users are expected to install them and have them on PATH; we
          # just log whether the CI runner happens to have them, purely
          # informationally.
          foreach ($tool in @("ffmpeg", "tesseract")) {
            $found = Get-Command $tool -ErrorAction SilentlyContinue
            if ($found) {
              Write-Host "(info) $tool is on this runner's PATH at $($found.Source) - NOT bundled; target machines must install it separately."
            }
          }

      - name: Include licenses and third-party notices
        shell: pwsh
        run: |
          Copy-Item -Force LICENSE-MIT dist/
          Copy-Item -Force LICENSE-APACHE dist/
          Copy-Item -Force THIRD_PARTY_NOTICES dist/

      # Signs dist/sms-archive.exe via Azure Artifact Signing (account
      # Slagathores-Apps, profile "public"). Only .exe files are signed:
      # dist/onnxruntime.dll is Microsoft's own already-signed redistributable,
      # and each file signed costs one signature from the monthly quota.
      - name: Sign (Windows)
        if: ${{ matrix.os == 'windows-latest' && env.HAS_AZURE_SIGNING == 'true' }}
        uses: azure/trusted-signing-action@v2.0.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://cus.codesigning.azure.net/
          trusted-signing-account-name: Slagathores-Apps
          certificate-profile-name: public
          files-folder: ${{ github.workspace }}/dist
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify signature (Windows)
        if: ${{ matrix.os == 'windows-latest' && env.HAS_AZURE_SIGNING == 'true' }}
        shell: pwsh
        run: |
          $sig = Get-AuthenticodeSignature (Join-Path "dist" "${{ matrix.bin }}")
          $sig | Format-List Status, StatusMessage, @{ n = "Signer"; e = { $_.SignerCertificate.Subject } }
          if ($sig.Status -ne "Valid") {
            throw "Authenticode signature on ${{ matrix.bin }} is '$($sig.Status)', expected 'Valid'."
          }

      - name: Sign (Windows) - skipped
        if: ${{ matrix.os == 'windows-latest' && env.HAS_AZURE_SIGNING != 'true' }}
        shell: pwsh
        run: Write-Host "AZURE_TENANT_ID / AZURE_CLIENT_ID / AZURE_CLIENT_SECRET secrets are not all set - shipping this build UNSIGNED."

      - name: Notarize (macOS)
        if: ${{ matrix.os == 'macos-latest' && env.HAS_APPLE_ID == 'true' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="$RUNNER_TEMP/sms-archive-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$APPLE_CERT_BASE64" | base64 --decode > "$RUNNER_TEMP/sms-archive-cert.p12"
          security import "$RUNNER_TEMP/sms-archive-cert.p12" -k "$KEYCHAIN_PATH" -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          codesign --force --options runtime --timestamp --sign "$APPLE_SIGNING_IDENTITY" "dist/${{ matrix.bin }}"
          codesign --verify --verbose "dist/${{ matrix.bin }}"

          ditto -c -k --keepParent "dist/${{ matrix.bin }}" "$RUNNER_TEMP/sms-archive-notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/sms-archive-notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # Stapling a bare executable (not a .app/.pkg/.dmg) isn't supported
          # by `stapler`; Gatekeeper re-checks with Apple online instead,
          # which is fine as long as notarization above succeeded. Staple
          # here anyway in case this step is later pointed at a .app bundle.
          xcrun stapler staple "dist/${{ matrix.bin }}" || echo "Stapling skipped (not a stapleable bundle type); online notarization check still applies."

          rm -f "$RUNNER_TEMP/sms-archive-cert.p12" "$RUNNER_TEMP/sms-archive-notarize.zip"
          security delete-keychain "$KEYCHAIN_PATH"
      - name: Notarize (macOS) - skipped
        if: ${{ matrix.os == 'macos-latest' && env.HAS_APPLE_ID != 'true' }}
        run: echo "APPLE_ID secret is not set - shipping this build UNNOTARIZED."

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sms-archive-${{ matrix.target }}
          path: dist
